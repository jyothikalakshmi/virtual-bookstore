<div class="container mt-4">

    <!-- Admin: add book button  -->
    <div class="d-flex justify-content-between align-items-center mb-3" >
        <h4 class="fw-bold mb-0">All Books</h4>
        <button *ngIf="isAdmin" class="btn btn-success" (click)="toggleForm()">
            {{showForm?'Cancel':'+ Add Book'}}
        </button>
    </div>

    <!-- success/Error for admin actions -->
     <div *ngIf="formSuccess" class="alert alert-success">{{formSuccess}}</div>
     <div *ngIF="formError" class="alert alert-danger">{{formError}}</div>

     <!-- Admin: add/edit book form  -->
      <div class="card p-4 mb-4" *ngIf="showForm && isAdmin">
        <h5>{{isEditing ? 'Edit Book': 'Add New Book'}}</h5>
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Book Name</label>
                <input type="text" class="form-control" [(ngModel)]="newBook.bname"/>
            </div>
            <div class="col-md-6">
                <label class="form-label">Author</label>
                <input type="text" class="form-control" [(ngModel)]="newBook.author"/>
            </div>
            <div class="col-md-4">
                <label class="form-label">Price</label>
                <input type="text" class="form-control" [(ngModel)]="newBook.price"/>
            </div>
            <div class="col-md-4">
                <label class="form-label">Category</label>
                <input type="text" class="form-control" [(ngModel)]="newBook.category"/>
            </div>
            <div class="col-md-4">
                <label class="form-label">Stock</label>
                <input type="text" class="form-control" [(ngModel)]="newBook.stock"/>
            </div>
            <div class="col-12">
                <label class="form-label">Description</label>
                <textarea class="form-control" rows="3" [(ngModel)]="newBook.description"></textarea>
            </div>
            <div class="col-12">
                <button class="btn btn-primary" (click)="submitBook()">
                    {{isEditing ? 'Update Book' : 'Add Book'}}
                </button>
            </div>

        </div>
      </div>

      <!-- search filter sort -->
       <div class="row mb-4 g-2">
        <div class="col-md-4">
            <input type="text" class="form-control" placeholder="Search by title or author..."
             [(ngModel)]="searchTerm" (input)="applyFilters()"/>
        </div>
        <div class="col-md-3">
            <select class="form-select" [(ngModel)]="selectedCategory" (change)="applyFilters()">
                <option value="">All Categories</option>
                <option *ngFor="let cat of categories" [value]="cat">{{cat}}</option>
            </select>
        </div>
        <div class="col-md-3">
            <select class="form-select" [(ngModel)]="selectedSort" (change)="applyFilters()">
                <option value="">Sort By</option>
                <option value="title_asc">Title A-Z</option>
                <option value="title_desc">Title Z-A</option>
                <option value="price_asc">Price Low to High</option>
                <option value="price_desc">Price High to Low</option>
            </select>
        </div>
       </div>

       <!-- Books Grid  -->
        <div class="row g-4">
            <div class="col-md-3" *ngFor="let book of pagedBooks">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h6 class="card-title fw-bold">{{book.bname}}</h6>
                        <p class="card-text text-muted mb-1">{{book.author}}</p>
                        <span class="badge bg-secondary mb-2">{{book.category}}</span>
                        <p class="card-text fw-bold text-success">Rs{{ book.price}}</p>
                    </div>
                    <div class="card-footer bg-white border-0 d-flex flex-column gap-2">
                        <button class="btn btn-primary btn-sm w-100" (click)="viewBook(book.book_id)">
                            View Details
                        </button>

                        <!-- admin buttons  -->
                         <div *ngIf="isAdmin" class="d-flex gap-2">
                            <button class="btn btn-warning btn-sm w-50" (click)="editBook(book)">Edit</button>
                            <button class="btn btn-danger btn-sm w-50" (click)="deleteBook(book.book_id)">Delete</button>
                         </div>

                    </div>
                </div>
            </div>

            <!-- Empty -->
             <div *ngIf="pagedBooks.length===0" class="text-center mt-5">
                <h5 class="text-muted">No books found</h5>
             </div>

             <!-- pagination -->
              <nav class="mt-4" *ngIf="totalPages>1">
                <ul class="pagination justify-content-center">
                    <li class="page-item" [class.disabled]="currentPage===1">
                        <a class="page-link" style="cursor:pointer" (click)="goToPage(currentPage-1)">Previous</a>
                    </li>
                    <li class="page-item" *ngFor="let page of getPages()" [class.active]="page===currentPage">
                        <a class="page-link" style="cursor:pointer" (click)="goToPage(page)">{{page}}</a>
                    </li>
                    <li class="page-item" [class.disabled]="currentPage===totalPages">
                        <a class="page-link" style="cursor:pointer" (click)="goToPage(currentPage+1)">Next</a>
                    </li>
                </ul>
              </nav>

        </div>

</div>
