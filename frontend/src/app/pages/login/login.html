<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4" style="width:400px;">
        
        <h3 class="text-center mb-4">Virtual Book Store</h3>
        <div *ngIf="error" class="alert alert-danger">{{error}}</div>
        <!-- <div *ngIf="success" class="alert alert-success">{{success}}</div> -->

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" [(ngModel)]="credentials.email" placeholder="Enter email"/>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" [(ngModel)]="credentials.password" placeholder="Enter password"/>
        </div>

        <button class="btn btn-primary w-100" (click)="login()">Login</button>

        <p class="text-center mt-3">
            Dont have an account? <a routerLink="/register">Register here</a>
        </p>

    </div>
</div>
